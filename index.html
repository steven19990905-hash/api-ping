<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="API Ping" />
<title>🌸 API Ping</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌸</text></svg>">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:linear-gradient(160deg,#FFE8EF,#FFF5F7);
  color:#4A3642;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;
  min-height:100dvh;
  display:flex;flex-direction:column;align-items:center;
  padding:1.5rem 1rem 2rem;gap:1.25rem;position:relative;overflow-x:hidden
}
.sakura{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;overflow:hidden}
@keyframes f{0%{transform:translateY(-10vh) rotate(0deg);opacity:0}10%{opacity:.7}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}
.petal{position:absolute;top:-10vh;width:20px;height:20px;background:#FFD6E0;border-radius:50% 0 50% 0;opacity:0;animation:f linear infinite}
.header{display:flex;align-items:center;justify-content:space-between;width:100%;max-width:480px;position:relative;z-index:1}
.char-wrap{display:flex;align-items:center;justify-content:center;width:100%;max-width:480px;position:relative;z-index:1;margin-top:-.5rem}
.char-wrap svg{width:120px;height:120px;filter:drop-shadow(0 4px 12px rgba(255,143,171,.2))}
.header h1{font-size:1rem;font-weight:500;color:#A88995;letter-spacing:.1em}
.header h1::before{content:'🌸 '}
.edit-btn{font-size:.75rem;color:#FF8FAB;background:rgba(255,255,255,.7);border:1px solid rgba(255,183,197,.4);padding:.3rem .75rem;border-radius:20px;cursor:pointer}
.cards{display:flex;flex-direction:column;gap:.85rem;width:100%;max-width:480px;position:relative;z-index:1}
.group-card{background:rgba(255,255,255,.85);border:1px solid rgba(255,183,197,.4);border-radius:18px;overflow:hidden;box-shadow:0 4px 24px rgba(255,143,171,.1)}
.group-card.ok{border-color:rgba(107,203,158,.5)}
.group-card.fail{border-color:rgba(255,107,138,.5)}
.group-header{display:flex;align-items:center;gap:.6rem;padding:.85rem 1rem .7rem;border-bottom:1px solid rgba(255,183,197,.2)}
.group-icon{width:20px;height:20px;object-fit:contain;flex-shrink:0}
.group-name{font-size:.9rem;font-weight:600;flex:1;color:#4A3642}
.group-badge{font-size:.7rem;font-weight:600;padding:.2rem .65rem;border-radius:20px;background:#FFE4E9;color:#FF8FAB}
.group-badge.ok{background:rgba(107,203,158,.15);color:#6BCB9E}
.group-badge.fail{background:rgba(255,107,138,.15);color:#FF6B8A}
.model-list{padding:.5rem 0}
.model-row{display:flex;align-items:center;gap:.6rem;padding:.45rem 1rem}
.model-dot{width:8px;height:8px;border-radius:50%;background:#FFE4E9;flex-shrink:0;transition:all .3s}
.model-dot.ok{background:#6BCB9E;box-shadow:0 0 8px rgba(107,203,158,.5)}
.model-dot.fail{background:#FF6B8A;box-shadow:0 0 8px rgba(255,107,138,.5)}
.model-dot.testing{background:#FF8FAB;animation:pulse .8s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
.model-id{font-size:.8rem;font-family:monospace;color:#4A3642;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.model-info{font-size:.72rem;color:#A88995;text-align:right;min-width:44px}
.model-info.ok{color:#6BCB9E}
.model-info.fail{color:#FF6B8A}
.model-error{font-size:.68rem;color:#FF6B8A;padding:0 1rem .4rem 2.3rem;line-height:1.3}
.ping-wrap{width:100%;max-width:480px;margin-top:.25rem;position:relative;z-index:1}
#pingBtn{width:100%;padding:1.1rem;background:linear-gradient(135deg,#FFB7C5,#FF8FAB);color:#fff;border:none;border-radius:50px;font-size:1.15rem;font-weight:700;letter-spacing:.06em;cursor:pointer;box-shadow:0 4px 24px rgba(255,143,171,.3);display:flex;align-items:center;justify-content:center;gap:.5rem;font-family:inherit}
#pingBtn:active{transform:scale(.96)}
#pingBtn:disabled{background:linear-gradient(135deg,#E8C4CD,#D4A0B0);box-shadow:none;cursor:not-allowed}
#pingBtn.success{background:linear-gradient(135deg,#6BCB9E,#4FB883)}
#pingBtn.error{background:linear-gradient(135deg,#FF6B8A,#E55A78)}
.footer{font-size:.7rem;color:#A88995;text-align:center;position:relative;z-index:1}
#setup{position:fixed;inset:0;background:rgba(255,240,245,.95);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1.5rem;gap:1rem;z-index:200}
#setup h2{font-size:1.3rem;color:#FF6B8A;font-weight:500}
#setup h2::before{content:'🌸 '}
#setup p{font-size:.8rem;color:#A88995;text-align:center}
.setup-group{background:rgba(255,255,255,.85);border:1px solid rgba(255,183,197,.4);border-radius:14px;padding:1rem;width:100%;max-width:400px;display:flex;flex-direction:column;gap:.5rem}
.setup-group label{font-size:.78rem;color:#FF8FAB;font-weight:500}
.setup-group input{background:#FFF0F5;border:1px solid rgba(255,183,197,.4);color:#4A3642;padding:.55rem .75rem;border-radius:10px;font-size:.82rem;outline:none;width:100%;font-family:monospace}
.setup-group input:focus{border-color:#FF8FAB}
.setup-save{background:linear-gradient(135deg,#FFB7C5,#FF8FAB);color:#fff;border:none;padding:.75rem;border-radius:50px;font-size:.95rem;font-weight:600;cursor:pointer;width:100%;max-width:400px;font-family:inherit}
</style>
</head>
<body>
<div class="sakura" id="sakura"></div>
<div id="setup">
<h2>初次設定</h2>
<p>設定後會存在瀏覽器，之後只需按 PING</p>
<div class="setup-group"><label>🤖 DeepSeek Key</label><input type="password" id="keyDeepseek" placeholder="sk-..." /></div>
<div class="setup-group"><label>🟣 Claude Key</label><input type="password" id="keyClaude" placeholder="sk-..." /></div>
<button class="setup-save" onclick="saveSetup()">儲存並開始</button>
</div>
<div class="header"><h1>API STATUS</h1><button class="edit-btn" onclick="openSetup()">✏ Key</button></div>
<div class="char-wrap"><svg viewBox="0 0 200 240" fill="none" xmlns="http://www.w3.org/2000/svg">
<!-- hair back -->
<ellipse cx="100" cy="110" rx="62" ry="72" fill="#2D1B14"/>
<!-- face -->
<ellipse cx="100" cy="115" rx="40" ry="42" fill="#FFE4D6"/>
<!-- hair front -->
<path d="M60 105 Q60 55 100 48 Q140 55 140 105 L140 90 Q140 50 100 42 Q60 50 60 90Z" fill="#2D1B14"/>
<!-- bangs -->
<path d="M60 95 Q65 60 85 50 L82 75Z" fill="#3D2B24"/>
<path d="M68 90 Q75 55 100 48 L95 72Z" fill="#3D2B24"/>
<path d="M140 95 Q135 60 115 50 L118 75Z" fill="#3D2B24"/>
<path d="M132 90 Q125 55 100 48 L105 72Z" fill="#3D2B14"/>
<!-- eyes -->
<ellipse cx="82" cy="112" rx="9" ry="10" fill="#fff"/>
<ellipse cx="118" cy="112" rx="9" ry="10" fill="#fff"/>
<ellipse cx="84" cy="112" rx="6" ry="7" fill="#5C3D2E"/>
<ellipse cx="116" cy="112" rx="6" ry="7" fill="#5C3D2E"/>
<ellipse cx="85" cy="110" rx="3" ry="3" fill="#2D1B14"/>
<ellipse cx="115" cy="110" rx="3" ry="3" fill="#2D1B14"/>
<circle cx="89" cy="108" r="2" fill="#fff" opacity=".8"/>
<circle cx="119" cy="108" r="2" fill="#fff" opacity=".8"/>
<!-- blush -->
<ellipse cx="70" cy="128" rx="8" ry="4" fill="#FFB0B0" opacity=".5"/>
<ellipse cx="130" cy="128" rx="8" ry="4" fill="#FFB0B0" opacity=".5"/>
<!-- mouth -->
<path d="M93 132 Q100 137 107 132" stroke="#D4756B" stroke-width="1.5" fill="none" stroke-linecap="round"/>
<!-- kimono -->
<path d="M60 150 L58 220 L142 220 L140 150Z" fill="#FFB7C5"/>
<path d="M60 150 L100 142 L140 150" fill="#FF8FAB"/>
<path d="M96 145 L96 220" stroke="#D4756B" stroke-width="1" opacity=".3"/>
<path d="M104 145 L104 220" stroke="#D4756B" stroke-width="1" opacity=".3"/>
<!-- obi -->
<rect x="58" y="155" width="84" height="8" rx="3" fill="#FF6B8A"/>
<!-- sleeves -->
<path d="M60 150 L48 165 L54 175 L62 160Z" fill="#FFD0DC"/>
<path d="M140 150 L152 165 L146 175 L138 160Z" fill="#FFD0DC"/>
<!-- sakura hair ornament -->
<circle cx="130" cy="55" r="6" fill="#FFB7C5"/>
<circle cx="130" cy="55" r="3" fill="#FF8FAB"/>
</svg></div>
<div class="cards" id="cards">
<div class="group-card" id="grp-deepseek">
<div class="group-header"><img class="group-icon" src="https://www.deepseek.com/favicon.ico" alt="DeepSeek" /><span class="group-name">DeepSeek</span><span class="group-badge" id="badge-deepseek">待機</span></div>
<div class="model-list" id="list-deepseek"></div></div>
<div class="group-card" id="grp-claude">
<div class="group-header"><img class="group-icon" src="https://www.anthropic.com/favicon.ico" alt="Anthropic" /><span class="group-name">Claude</span><span class="group-badge" id="badge-claude">待機</span></div>
<div class="model-list" id="list-claude"></div></div>
</div>
<div class="ping-wrap"><button id="pingBtn" onclick="pingAll()">⚡ PING ALL</button></div>
<div class="footer" id="footer">—</div>
<script>
const BASE='https://www.packyapi.com',GROUPS=[{id:'deepseek',keyId:'keyDeepseek',storageKey:'pk_deepseek',models:['deepseek-v4-flash','deepseek-v4-pro']},{id:'claude',keyId:'keyClaude',storageKey:'pk_claude',models:['claude-sonnet-4-6']}];
function sakura(){const c=document.getElementById('sakura');for(let i=18;i--;){const p=document.createElement('div');p.className='petal';p.style.left=Math.random()*100+'%';p.style.animationDuration=(10+Math.random()*12)+'s';p.style.animationDelay=Math.random()*-20+'s';const s=12+Math.random()*14;p.style.width=s+'px';p.style.height=s+'px';c.appendChild(p)}}
function init(){sakura();const h=location.hash.slice(1);if(h){const p=new URLSearchParams(h);if(p.get('dk'))localStorage.setItem('pk_deepseek',p.get('dk'));if(p.get('ck'))localStorage.setItem('pk_claude',p.get('ck'));history.replaceState(null,'',location.pathname)}
GROUPS.forEach(g=>{const c=document.getElementById('list-'+g.id);c.innerHTML=g.models.map(m=>'<div class="model-row" id="row-'+m+'"><span class="model-dot" id="dot-'+m+'"></span><span class="model-id">'+m+'</span><span class="model-info" id="info-'+m+'">—</span></div>').join('')})
if(GROUPS.every(g=>localStorage.getItem(g.storageKey)))document.getElementById('setup').style.display='none'}
function saveSetup(){GROUPS.forEach(g=>{const v=document.getElementById(g.keyId).value.trim();if(v)localStorage.setItem(g.storageKey,v)});if(!GROUPS.every(g=>localStorage.getItem(g.storageKey))){alert('請填入所有 API Key');return};document.getElementById('setup').style.display='none'}
function openSetup(){GROUPS.forEach(g=>{document.getElementById(g.keyId).value=localStorage.getItem(g.storageKey)||''});document.getElementById('setup').style.display='flex'}
async function pingAll(){const btn=document.getElementById('pingBtn');btn.disabled=true;btn.textContent='🔄 檢測中…';btn.className='';const start=Date.now();GROUPS.forEach(g=>{setBadge(g.id,'idle','檢測中');g.models.forEach(m=>{setDot(m,'testing');setInfo(m,'','');rmErr(m)})})
const r=await Promise.all(GROUPS.map(g=>pingGroup(g))),e=((Date.now()-start)/1e3).toFixed(1),ok=r.every(Boolean);btn.disabled=false;btn.textContent=ok?'✅ 全部正常':'❌ 有異常';btn.className=ok?'success':'error';setTimeout(()=>{btn.textContent='⚡ PING ALL';btn.className=''},3e3);document.getElementById('footer').textContent='最後檢測：'+new Date().toLocaleTimeString()+'　耗時 '+e+'s'}
async function pingGroup(g){const key=localStorage.getItem(g.storageKey);if(!key){g.models.forEach(m=>{setDot(m,'fail');setInfo(m,'no key','fail')});setBadge(g.id,'fail','無 Key');return false}
const r=await Promise.all(g.models.map(m=>pingModel(key,m))),ok=r.every(Boolean);setBadge(g.id,ok?'ok':'fail',ok?'正常':'異常');document.getElementById('grp-'+g.id).className='group-card '+(ok?'ok':'fail');return ok}
async function pingModel(key,m){const s=Date.now();try{const r=await fetch(BASE+'/v1/chat/completions',{method:'POST',headers:{'Authorization':'Bearer '+key,'Content-Type':'application/json'},body:JSON.stringify({model:m,messages:[{role:'user',content:'hi'}],max_tokens:1}),signal:AbortSignal.timeout(15e3)}),l=Date.now()-s;if(!r.ok){const j=await r.json().catch(()=>({})),msg=j?.error?.message||'HTTP '+r.status;setDot(m,'fail');setInfo(m,''+r.status,'fail');shwErr(m,msg);return false}
setDot(m,'ok');setInfo(m,fmt(l),'ok');return true}catch(e){const l=Date.now()-s,to=e.name==='TimeoutError'||e.name==='AbortError';setDot(m,'fail');setInfo(m,to?'timeout':'error','fail');shwErr(m,to?'超時 ('+fmt(l)+')':e.message);return false}}
function setDot(i,c){const e=document.getElementById('dot-'+i);if(e)e.className='model-dot '+c}
function setInfo(i,t,c){const e=document.getElementById('info-'+i);if(e){e.textContent=t;e.className='model-info '+c}}
function shwErr(m,msg){const row=document.getElementById('row-'+m);if(!row)return;let e=document.getElementById('err-'+m);if(!e){e=document.createElement('div');e.id='err-'+m;e.className='model-error';row.after(e)}e.textContent=msg}
function rmErr(m){const e=document.getElementById('err-'+m);if(e)e.remove()}
function setBadge(i,c,t){const e=document.getElementById('badge-'+i);if(e){e.textContent=t;e.className='group-badge '+c}}
function fmt(m){return m>=1e3?(m/1e3).toFixed(1)+'s':m+'ms'}
init();
</script>
</body>
</html>

    :root {
      --sakura-light: #FFF0F5;
      --sakura-pale: #FFE4E9;
      --sakura-pink: #FFB7C5;
      --sakura-medium: #FF8FAB;
      --sakura-deep: #FF6B8A;
      --sakura-shadow: #D4849A;
      --petal: #FFD6E0;
      --bg-top: #FFE8EF;
      --bg-bottom: #FFF5F7;
      --card-bg: rgba(255, 255, 255, 0.85);
      --card-border: rgba(255, 183, 197, 0.4);
      --text: #4A3642;
      --text-muted: #A88995;
      --ok: #6BCB9E;
      --fail: #FF6B8A;
      --warn: #F0A500;
      --accent: #FF8FAB;
      --accent-glow: rgba(255, 143, 171, 0.3);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      background: linear-gradient(160deg, var(--bg-top), var(--bg-bottom));
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1.5rem 1rem 2rem;
      gap: 1.25rem;
      position: relative;
      overflow-x: hidden;
    }

    /* ── Sakura Petals Animation ── */
    .sakura-container {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    @keyframes fall {
      0%   { transform: translateY(-10vh) rotate(0deg) translateX(0); opacity: 0; }
      10%  { opacity: 0.7; }
      100% { transform: translateY(110vh) rotate(720deg) translateX(100px); opacity: 0; }
    }

    @keyframes fall2 {
      0%   { transform: translateY(-10vh) rotate(0deg) translateX(0); opacity: 0; }
      10%  { opacity: 0.5; }
      100% { transform: translateY(110vh) rotate(-540deg) translateX(-80px); opacity: 0; }
    }

    .petal {
      position: absolute;
      top: -10vh;
      width: 20px; height: 20px;
      background: var(--petal);
      border-radius: 50% 0 50% 0;
      opacity: 0;
      animation: fall linear infinite;
    }

    .petal:nth-child(2n) {
      width: 16px; height: 16px;
      background: #FFDEE8;
      animation-name: fall2;
    }
    .petal:nth-child(3n) {
      width: 14px; height: 14px;
      background: #FFC9D6;
    }
    .petal:nth-child(4n) {
      width: 22px; height: 22px;
      background: #FFE0EA;
      animation-duration: 14s;
    }
    .petal:nth-child(5n) {
      width: 18px; height: 18px;
      background: #FFD0DC;
      animation-duration: 18s;
      animation-delay: -5s;
    }
    .petal:nth-child(6n) {
      width: 12px; height: 12px;
      background: #FFC5D4;
      animation-duration: 12s;
      animation-delay: -2s;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      max-width: 480px;
      position: relative;
      z-index: 1;
    }
    .header h1 {
      font-size: 1rem;
      font-weight: 500;
      color: var(--text-muted);
      letter-spacing: 0.1em;
    }
    .header h1::before {
      content: '🌸 ';
    }

    .edit-btn {
      font-size: 0.75rem;
      color: var(--sakura-medium);
      background: rgba(255, 255, 255, 0.7);
      border: 1px solid var(--card-border);
      padding: 0.3rem 0.75rem;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .edit-btn:hover {
      background: var(--sakura-pink);
      color: #fff;
      border-color: var(--sakura-pink);
    }

    /* ── Cards ── */
    .cards {
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
      width: 100%;
      max-width: 480px;
      position: relative;
      z-index: 1;
    }

    .group-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 18px;
      overflow: hidden;
      transition: border-color 0.3s, box-shadow 0.3s;
      box-shadow: 0 4px 24px rgba(255, 143, 171, 0.1);
    }
    .group-card.ok {
      border-color: rgba(107, 203, 158, 0.5);
      box-shadow: 0 4px 24px rgba(107, 203, 158, 0.15);
    }
    .group-card.fail {
      border-color: rgba(255, 107, 138, 0.5);
      box-shadow: 0 4px 24px rgba(255, 107, 138, 0.15);
    }

    .group-header {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.85rem 1rem 0.7rem;
      border-bottom: 1px solid rgba(255, 183, 197, 0.2);
    }
    .group-icon { width: 20px; height: 20px; object-fit: contain; flex-shrink: 0; }
    .group-name { font-size: 0.9rem; font-weight: 600; flex: 1; color: var(--text); }
    .group-badge {
      font-size: 0.7rem;
      font-weight: 600;
      padding: 0.2rem 0.65rem;
      border-radius: 20px;
      background: var(--sakura-pale);
      color: var(--sakura-medium);
    }
    .group-badge.ok {
      background: rgba(107, 203, 158, 0.15);
      color: var(--ok);
    }
    .group-badge.fail {
      background: rgba(255, 107, 138, 0.15);
      color: var(--fail);
    }

    .model-list { padding: 0.5rem 0; }

    .model-row {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.45rem 1rem;
    }

    .model-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--sakura-pale);
      flex-shrink: 0;
      transition: background 0.3s, box-shadow 0.3s;
    }
    .model-dot.ok {
      background: var(--ok);
      box-shadow: 0 0 8px rgba(107, 203, 158, 0.5);
    }
    .model-dot.fail {
      background: var(--fail);
      box-shadow: 0 0 8px rgba(255, 107, 138, 0.5);
    }
    .model-dot.testing {
      background: var(--sakura-medium);
      animation: pulse 0.8s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.7); }
    }

    .model-id {
      font-size: 0.8rem;
      font-family: monospace;
      color: var(--text);
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .model-info {
      font-size: 0.72rem;
      color: var(--text-muted);
      text-align: right;
      min-width: 44px;
    }
    .model-info.ok   { color: var(--ok); }
    .model-info.fail { color: var(--fail); }

    .model-error {
      font-size: 0.68rem;
      color: var(--fail);
      padding: 0 1rem 0.4rem 2.3rem;
      line-height: 1.3;
    }

    /* ── Ping button ── */
    .ping-wrap {
      width: 100%;
      max-width: 480px;
      margin-top: 0.25rem;
      position: relative;
      z-index: 1;
    }

    #pingBtn {
      width: 100%;
      padding: 1.1rem;
      background: linear-gradient(135deg, var(--sakura-pink), var(--sakura-medium));
      color: #fff;
      border: none;
      border-radius: 50px;
      font-size: 1.15rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 24px var(--accent-glow);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      font-family: inherit;
    }
    #pingBtn:active { transform: scale(0.96); }
    #pingBtn:disabled {
      background: linear-gradient(135deg, #E8C4CD, #D4A0B0);
      box-shadow: none;
      cursor: not-allowed;
    }
    #pingBtn.success {
      background: linear-gradient(135deg, #6BCB9E, #4FB883);
      box-shadow: 0 4px 20px rgba(107, 203, 158, 0.3);
    }
    #pingBtn.error {
      background: linear-gradient(135deg, var(--fail), #E55A78);
      box-shadow: 0 4px 20px rgba(255, 107, 138, 0.3);
    }

    /* ── Footer ── */
    .footer {
      font-size: 0.7rem;
      color: var(--text-muted);
      text-align: center;
      position: relative;
      z-index: 1;
    }

    /* ── Setup overlay ── */
    #setup {
      position: fixed; inset: 0;
      background: rgba(255, 240, 245, 0.95);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      gap: 1rem;
      z-index: 200;
    }
    #setup h2 {
      font-size: 1.3rem;
      color: var(--sakura-deep);
      font-weight: 500;
    }
    #setup h2::before { content: '🌸 '; }
    #setup p  {
      font-size: 0.8rem;
      color: var(--text-muted);
      text-align: center;
    }

    .setup-group {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 14px;
      padding: 1rem;
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .setup-group label {
      font-size: 0.78rem;
      color: var(--sakura-medium);
      font-weight: 500;
    }
    .setup-group input {
      background: var(--sakura-light);
      border: 1px solid var(--card-border);
      color: var(--text);
      padding: 0.55rem 0.75rem;
      border-radius: 10px;
      font-size: 0.82rem;
      outline: none;
      width: 100%;
      font-family: monospace;
      transition: border-color 0.2s;
    }
    .setup-group input:focus { border-color: var(--sakura-medium); }

    .setup-save {
      background: linear-gradient(135deg, var(--sakura-pink), var(--sakura-medium));
      color: #fff;
      border: none;
      padding: 0.75rem;
      border-radius: 50px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      max-width: 400px;
      transition: all 0.2s;
      font-family: inherit;
    }
    .setup-save:active { transform: scale(0.97); }
  </style>
</head>
<body>

<!-- Sakura Petals -->
<div class="sakura-container" id="sakuraContainer"></div>

<!-- Setup overlay -->
<div id="setup">
  <h2>初次設定</h2>
  <p>設定後會存在瀏覽器，之後只需按 PING</p>

  <div class="setup-group">
    <label>🤖 DeepSeek Key（PackyAPI）</label>
    <input type="password" id="keyDeepseek" placeholder="sk-..." />
  </div>

  <div class="setup-group">
    <label>🟣 Claude Key（PackyAPI）</label>
    <input type="password" id="keyClaude" placeholder="sk-..." />
  </div>

  <button class="setup-save" onclick="saveSetup()">儲存並開始</button>
</div>

<!-- Main UI -->
<div class="header">
  <h1>API STATUS</h1>
  <button class="edit-btn" onclick="openSetup()">✏ Key</button>
</div>

<div class="cards" id="cards">

  <!-- DeepSeek Group -->
  <div class="group-card" id="grp-deepseek">
    <div class="group-header">
      <img class="group-icon" src="https://www.deepseek.com/favicon.ico" alt="DeepSeek" />
      <span class="group-name">DeepSeek</span>
      <span class="group-badge" id="badge-deepseek">待機</span>
    </div>
    <div class="model-list" id="list-deepseek"></div>
  </div>

  <!-- Claude Group -->
  <div class="group-card" id="grp-claude">
    <div class="group-header">
      <img class="group-icon" src="https://www.anthropic.com/favicon.ico" alt="Anthropic" />
      <span class="group-name">Claude</span>
      <span class="group-badge" id="badge-claude">待機</span>
    </div>
    <div class="model-list" id="list-claude"></div>
  </div>

</div>

<div class="ping-wrap">
  <button id="pingBtn" onclick="pingAll()">⚡ PING ALL</button>
</div>

<div class="footer" id="footer">—</div>

<script>
  const BASE = 'https://www.packyapi.com';

  const GROUPS = [
    {
      id: 'deepseek',
      keyId: 'keyDeepseek',
      storageKey: 'pk_deepseek',
      models: ['deepseek-v4-flash', 'deepseek-v4-pro']
    },
    {
      id: 'claude',
      keyId: 'keyClaude',
      storageKey: 'pk_claude',
      models: ['claude-sonnet-4-6']
    }
  ];

  // Sakura Petals Generator
  function createSakura() {
    const container = document.getElementById('sakuraContainer');
    const count = 18;
    for (let i = 0; i < count; i++) {
      const petal = document.createElement('div');
      petal.className = 'petal';
      petal.style.left = Math.random() * 100 + '%';
      petal.style.animationDuration = (10 + Math.random() * 12) + 's';
      petal.style.animationDelay = Math.random() * -20 + 's';
      petal.style.width = (12 + Math.random() * 14) + 'px';
      petal.style.height = petal.style.width;
      container.appendChild(petal);
    }
  }

  function init() {
    createSakura();

    const hash = window.location.hash.slice(1);
    if (hash) {
      const params = new URLSearchParams(hash);
      if (params.get('dk')) localStorage.setItem('pk_deepseek', params.get('dk'));
      if (params.get('ck')) localStorage.setItem('pk_claude',   params.get('ck'));
      history.replaceState(null, '', window.location.pathname);
    }
    GROUPS.forEach(g => renderModelList(g));
    const allSet = GROUPS.every(g => localStorage.getItem(g.storageKey));
    if (allSet) document.getElementById('setup').style.display = 'none';
  }

  function renderModelList(group) {
    const container = document.getElementById('list-' + group.id);
    container.innerHTML = group.models.map(m => `
      <div class="model-row" id="row-${m}">
        <span class="model-dot" id="dot-${m}"></span>
        <span class="model-id">${m}</span>
        <span class="model-info" id="info-${m}">—</span>
      </div>
    `).join('');
  }

  function saveSetup() {
    GROUPS.forEach(g => {
      const val = document.getElementById(g.keyId).value.trim();
      if (val) localStorage.setItem(g.storageKey, val);
    });
    const allSet = GROUPS.every(g => localStorage.getItem(g.storageKey));
    if (!allSet) { alert('請填入所有 API Key'); return; }
    document.getElementById('setup').style.display = 'none';
  }

  function openSetup() {
    GROUPS.forEach(g => {
      const saved = localStorage.getItem(g.storageKey) || '';
      document.getElementById(g.keyId).value = saved;
    });
    document.getElementById('setup').style.display = 'flex';
  }

  async function pingAll() {
    const btn = document.getElementById('pingBtn');
    btn.disabled = true;
    btn.textContent = '🔄 檢測中…';
    btn.className = '';

    GROUPS.forEach(g => {
      setGroupBadge(g.id, 'idle', '檢測中');
      g.models.forEach(m => {
        setDot(m, 'testing');
        setInfo(m, '', '');
        removeError(m);
      });
    });

    const start = Date.now();
    const results = await Promise.all(GROUPS.map(g => pingGroup(g)));
    const elapsed = ((Date.now() - start) / 1000).toFixed(1);
    const allOk = results.every(r => r);

    btn.disabled = false;
    btn.textContent = allOk ? '✅ 全部正常' : '❌ 有異常';
    btn.className = allOk ? 'success' : 'error';

    setTimeout(() => {
      btn.textContent = '⚡ PING ALL';
      btn.className = '';
    }, 3000);

    document.getElementById('footer').textContent =
      `最後檢測：${new Date().toLocaleTimeString()}　耗時 ${elapsed}s`;
  }

  async function pingGroup(group) {
    const key = localStorage.getItem(group.storageKey);
    if (!key) {
      group.models.forEach(m => { setDot(m, 'fail'); setInfo(m, 'no key', 'fail'); });
      setGroupBadge(group.id, 'fail', '無 Key');
      return false;
    }

    const results = await Promise.all(group.models.map(m => pingModel(key, m)));
    const allOk = results.every(Boolean);
    setGroupBadge(group.id, allOk ? 'ok' : 'fail', allOk ? '正常' : '異常');
    document.getElementById('grp-' + group.id).className =
      'group-card ' + (allOk ? 'ok' : 'fail');
    return allOk;
  }

  async function pingModel(key, modelId) {
    const start = Date.now();
    try {
      const res = await fetch(`${BASE}/v1/chat/completions`, {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${key}`,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          model: modelId,
          messages: [{ role: 'user', content: 'hi' }],
          max_tokens: 1
        }),
        signal: AbortSignal.timeout(15000)
      });
      const latency = Date.now() - start;

      if (!res.ok) {
        const j = await res.json().catch(() => ({}));
        const msg = j?.error?.message || `HTTP ${res.status}`;
        setDot(modelId, 'fail');
        setInfo(modelId, `${res.status}`, 'fail');
        showError(modelId, msg);
        return false;
      }

      setDot(modelId, 'ok');
      setInfo(modelId, formatMs(latency), 'ok');
      return true;
    } catch (e) {
      const latency = Date.now() - start;
      const isTimeout = e.name === 'TimeoutError' || e.name === 'AbortError';
      setDot(modelId, 'fail');
      setInfo(modelId, isTimeout ? 'timeout' : 'error', 'fail');
      showError(modelId, isTimeout ? `超時 (${formatMs(latency)})` : e.message);
      return false;
    }
  }

  function setDot(modelId, cls) {
    const el = document.getElementById('dot-' + modelId);
    if (el) el.className = 'model-dot ' + cls;
  }

  function setInfo(modelId, text, cls) {
    const el = document.getElementById('info-' + modelId);
    if (el) { el.textContent = text; el.className = 'model-info ' + cls; }
  }

  function showError(modelId, msg) {
    const row = document.getElementById('row-' + modelId);
    if (!row) return;
    let err = document.getElementById('err-' + modelId);
    if (!err) {
      err = document.createElement('div');
      err.id = 'err-' + modelId;
      err.className = 'model-error';
      row.after(err);
    }
    err.textContent = msg;
  }

  function removeError(modelId) {
    const el = document.getElementById('err-' + modelId);
    if (el) el.remove();
  }

  function setGroupBadge(groupId, cls, text) {
    const el = document.getElementById('badge-' + groupId);
    if (el) { el.textContent = text; el.className = 'group-badge ' + cls; }
  }

  function formatMs(ms) {
    return ms >= 1000 ? (ms / 1000).toFixed(1) + 's' : ms + 'ms';
  }

  init();
</script>
</body>
</html>
